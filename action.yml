name: Sync settings.yml
description: >-
  Sync .github/settings.yml to repository settings via the GitHub REST API.
  App-free alternative to probot/settings.

inputs:
  settings-path:
    description: Path to the settings YAML file.
    required: false
    default: .github/settings.yml
  github-token:
    description: >-
      Token that can update repository settings — a fine-grained PAT with
      "Administration: write" on the target repo, or a GitHub App
      installation token. The workflow GITHUB_TOKEN cannot be granted this
      permission, so it will not work here.
    required: true
  dry-run:
    description: If true, report changes without applying them.
    required: false
    default: "false"

branding:
  icon: settings
  color: blue

runs:
  using: composite
  steps:
    - name: Sync settings
      shell: bash
      env:
        SETTINGS_PATH: ${{ inputs.settings-path }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        DRY_RUN: ${{ inputs.dry-run }}
      run: ${{ github.action_path }}/scripts/sync-settings.sh
