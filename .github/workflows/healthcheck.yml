# Checks this repository against a recommended secure-OSS baseline.
# To reuse in another repo, copy this file plus scripts/healthcheck.sh
# (or check out run-action/gh-settings and run the script from there).
name: Repo healthcheck

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 6 * * 1" # weekly, Monday morning
  workflow_dispatch: {}

permissions: {}

jobs:
  healthcheck:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run healthcheck
        env:
          # Admin-only settings (secret scanning, Actions token permissions)
          # are only visible to an admin token, so prefer REPO_SETTINGS_TOKEN
          # (the same fine-grained PAT the sync workflow uses) and fall back
          # to the default token, degrading those checks to warnings.
          GITHUB_TOKEN: ${{ secrets.REPO_SETTINGS_TOKEN || secrets.GITHUB_TOKEN }}
        run: scripts/healthcheck.sh
